services:
  postgres:
    image: postgres:16-alpine
    container_name: magic_todo_postgres
    environment:
      POSTGRES_USER: magic_todo
      POSTGRES_PASSWORD: magic_todo123
      POSTGRES_DB: magic_todo_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U magic_todo -d magic_todo_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
